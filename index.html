<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Pizza - Tarjeta Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e63946;
            --pizza-gold: #ffb703;
            --dark: #1d3557;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #f0f2f5;
            display: flex; justify-content: center;
        }

        .card-container {
            width: 100%; max-width: 480px;
            background: #fff; min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        /* Header con el Logo del Bordado */
        .header {
            background-color: var(--primary-red);
            padding: 40px 20px; text-align: center; color: white;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .logo-circle {
            width: 130px; height: 130px;
            background: white; border-radius: 50%;
            margin: 0 auto 15px; display: flex;
            align-items: center; justify-content: center;
            border: 4px solid var(--pizza-gold);
            overflow: hidden;
        }

        /* Recreación digital del logo enviado */
        .logo-emu {
            color: var(--primary-red); font-family: 'Brush Script MT', cursive;
            font-size: 28px; line-height: 1; text-align: center;
        }

        /* Catálogo de Productos con Fotos de Internet */
        .catalog { padding: 20px; flex-grow: 1; }
        .price-badge {
            background: var(--pizza-gold); color: #000;
            font-weight: bold; padding: 10px; border-radius: 10px;
            margin-bottom: 20px; font-size: 1.2rem; text-align: center;
        }

        .grid-menu {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .product-card {
            background: #fff; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .product-card img {
            width: 100%; height: 110px; object-fit: cover;
        }

        .product-name {
            padding: 8px; font-size: 0.85rem; font-weight: bold;
            text-align: center; color: var(--dark);
        }

        /* Botonera de Contacto */
        .contact-actions {
            padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .btn {
            text-decoration: none; padding: 15px; border-radius: 12px;
            color: white; font-weight: bold; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        .btn-ws { background: #25D366; }
        .btn-call { background: #007bff; }
        .btn-map { background: #ea4335; }
        .btn-web { background: #333; }

        .footer {
            background: #f8f9fa; padding: 20px; text-align: center;
            font-size: 11px; color: #666; border-top: 1px solid #eee;
        }

        #timer { font-weight: bold; color: var(--primary-red); }
    </style>
</head>
<body>

<div class="card-container">
    <div class="header">
        <div class="logo-circle">
            <div class="logo-emu">Solo<br><span style="font-size: 35px;">Pizza</span></div>
        </div>
        <h1 style="margin:0; letter-spacing: 1px;">SOLO PIZZA</h1>
        <p style="margin:5px 0 0; opacity:0.9;">Parque Las Ceibas - Local 107</p>
    </div>

    <div class="catalog">
        <div class="price-badge">🍕 Porción Individual: $7.000</div>
        
        <div class="grid-menu">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400" alt="Hawaiana">
                <div class="product-name">Hawaiana</div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=400" alt="Jamon Queso">
                <div class="product-name">Jamón y Queso</div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1571407970349-bc81e7e96d47?auto=format&fit=crop&w=400" alt="Pollo Champiñones">
                <div class="product-name">Pollo / Champiñones</div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?auto=format&fit=crop&w=400" alt="Ranchera">
                <div class="product-name">Ranchera / Maicitos</div>
            </div>
        </div>
    </div>

    <div class="contact-actions">
        <a href="https://wa.me/573148908604?text=Hola!%20Vengo%20de%20tu%20tarjeta%20digital,%20quiero%20una%20pizza" class="btn btn-ws">
            <i class="fab fa-whatsapp fa-2x"></i> WhatsApp
        </a>
        <a href="tel:+573148908604" class="btn btn-call">
            <i class="fas fa-phone-alt fa-2x"></i> Llamar
        </a>
        <a href="https://www.google.com/maps/search/Parque+las+ceibas+local+107" class="btn btn-map">
            <i class="fas fa-map-marker-alt fa-2x"></i> Ubicación
        </a>
        <a href="https://haroldco45.github.io/solopizza/#" class="btn btn-web">
            <i class="fas fa-globe fa-2x"></i> Ver Web
        </a>
    </div>

    <div class="footer">
        <p id="clock"></p>
        <p>App desarrollada por <strong>vibras positivas (3117700431)</strong><br>
        Derechos de autor reservados &copy; 2026</p>
    </div>
</div>

<script>
    // Control de suscripción invisible (Vencimiento 2026)
    const expiry = new Date('2026-12-31');
    if (new Date() > expiry) {
        document.body.innerHTML = "<div style='padding:50px; text-align:center;'>Servicio temporalmente suspendido.</div>";
    }

    // Hora real de Colombia
    function updateTime() {
        const now = new Date();
        const options = { timeZone: 'America/Bogota', hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit', day: 'numeric', month: 'long' };
        document.getElementById('clock').innerText = "Colombia: " + now.toLocaleString('es-CO', options);
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
